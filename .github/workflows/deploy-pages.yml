name: Deploy web to GitHub Pages

# Builds the Next.js static export in apps/web and publishes it to GitHub Pages.
# Project site URL: https://miramind-ai.github.io/buddy/

on:
  # Deploy on every push to main…
  push:
    branches: [main]
    paths:
      - apps/web/**
      - packages/shared/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-pages.yml
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Minimum permissions required by the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    env:
      # GitHub Pages serves this repo at /buddy — see apps/web/next.config.js.
      NEXT_PUBLIC_BASE_PATH: /buddy
      # Optional: point the deployed app at a live backend by defining the
      # repository variable NEXT_PUBLIC_API_URL (Settings → Variables).
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (next build → static export)
        run: pnpm --filter web build

      - name: Disable Jekyll processing
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
